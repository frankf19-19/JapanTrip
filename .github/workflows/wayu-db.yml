name: 建置和遊誌擴充景點資料庫
on:
  workflow_dispatch:        # 可手動觸發(Actions 頁按 Run workflow)
  schedule:
    - cron: "0 18 * * 0"    # 每週日 18:00 UTC(台灣週一凌晨2點)自動更新
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 從 Wikidata 抓取全日本景點
        run: python scripts/build_spots_db.py
      - name: 從 OSM 抓取全日本餐廳/飯店(分區檔)
        run: python scripts/build_places_db.py
      - name: 提交資料庫
        run: |
          git config user.name "wayu-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "資料無變化" || (git commit -m "chore: 更新擴充景點資料庫" && git push)
