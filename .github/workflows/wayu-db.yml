name: 建置旅日和擴充資料庫
on:
  workflow_dispatch:        # 可手動觸發(Actions 頁按 Run workflow)
  schedule:
    - cron: "0 18 * * 0"    # 每週日 18:00 UTC(台灣週一凌晨2點)自動更新
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 從 Wikidata 抓取全日本景點
        run: python scripts/build_spots_db.py
      - name: 安裝 osmium-tool
        run: sudo apt-get update -qq && sudo apt-get install -y -qq osmium-tool
      - name: 下載全日本 OSM 資料(Geofabrik,約2.3GB)
        run: |
          for i in 1 2 3 4 5; do
            echo "下載嘗試 $i…"
            curl -sSL --fail --retry 3 --retry-all-errors -C - \
              -o japan.osm.pbf \
              https://download.geofabrik.de/asia/japan-latest.osm.pbf && break
            echo "失敗,20 秒後重試"; sleep 20
          done
          ls -lh japan.osm.pbf
          # 大小驗證:必須 > 1.5GB,否則多半是錯誤頁而非 PBF
          SIZE=$(stat -c%s japan.osm.pbf)
          if [ "$SIZE" -lt 1500000000 ]; then
            echo "::error::下載檔僅 $SIZE bytes,不是完整 PBF(可能是伺服器錯誤頁)"; exit 1
          fi
      - name: 驗證 PBF 完整性
        run: osmium fileinfo japan.osm.pbf | head -20
      - name: 篩選 POI(本地處理,零限流)
        run: |
          osmium tags-filter japan.osm.pbf \
            nwr/amenity=restaurant,cafe,fast_food,bar,pub,food_court,ice_cream,biergarten,place_of_worship,marketplace,public_bath,karaoke_box \
            nwr/tourism=attraction,viewpoint,museum,gallery,artwork,theme_park,zoo,aquarium,picnic_site,hotel,hostel,guest_house,apartment,motel,chalet,love_hotel,alpine_hut,wilderness_hut,camp_site,caravan_site \
            nwr/historic \
            nwr/shop=mall,department_store,supermarket,bakery,confectionery,sweets,gift,souvenir,tea,sake,anime,toys,convenience,chemist,cosmetics,clothes,shoes,electronics,variety_store,second_hand \
            nwr/craft=sake_brewery,brewery,winery,distillery \
            nwr/leisure=park,garden,spa,amusement_arcade,beach_resort \
            nwr/man_made=tower \
            nwr/natural=peak,waterfall,hot_spring,beach,cape,bay,cliff,cave_entrance \
            -o pois.osm.pbf --overwrite
      - name: 轉出 GeoJSON
        run: osmium export pois.osm.pbf -f geojsonseq -o pois.geojsonl --overwrite
      - name: 建置分區檔
        run: python scripts/build_places_db.py pois.geojsonl
      - name: 提交資料庫
        if: always()
        run: |
          git config user.name "wayu-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/
          git diff --cached --quiet && echo "資料無變化" || (git commit -m "chore: 更新資料庫(Geofabrik 全量)" && git push)
